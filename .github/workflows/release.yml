name: release

on:
  push:
    tags:
      - 'IperfWin-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to package during dry-run
        required: false
        default: IperfWin-v1.1.4
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $releaseTag = if ("${{ github.event_name }}" -eq "push") {
            "${{ github.ref_name }}"
          } else {
            "${{ inputs.release_tag }}"
          }

          if ($releaseTag -notmatch '^IperfWin-v\d+\.\d+\.\d+$') {
            throw "Unexpected release tag: $releaseTag"
          }

          $releaseVersion = $releaseTag -replace '^IperfWin-v', ''
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake --preset windows-ucrt64

      - name: Build
        shell: msys2 {0}
        run: cmake --build --preset windows-ucrt64

      - name: Verify runtime payload
        shell: pwsh
        run: ./scripts/verify_runtime_payload.ps1 -BinDir "build/windows-ucrt64/bin"

      - name: Quick smoke tests
        shell: msys2 {0}
        run: ctest --test-dir build/windows-ucrt64 --output-on-failure --parallel 2 -R 'IperfSmoke(JsonParser|ExportSafety|AddressSelection)'

      - name: Functional smoke tests
        shell: msys2 {0}
        run: ctest --test-dir build/windows-ucrt64 --output-on-failure --parallel 2 -R 'IperfSmoke(EndToEnd|ValidationMatrix|StopCycle)'

      - name: Package ZIP
        id: package_zip
        shell: pwsh
        run: |
          $packageDir = "build/windows-ucrt64/package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $zipPath = Join-Path (Resolve-Path $packageDir).Path "${{ steps.meta.outputs.release_tag }}-windows-ucrt64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "build/windows-ucrt64/bin/*" -DestinationPath $zipPath -Force
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        id: package_installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build/windows-ucrt64/installer" | Out-Null
          $isccCandidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            $iscc = (Get-Command iscc.exe).Source
          }
          $outputDir = (Resolve-Path "build/windows-ucrt64/installer").Path
          & $iscc "/O$outputDir" "/FIperfWinSetup" "installer/IperfWin.iss"

          $releaseInstaller = Join-Path $outputDir "${{ steps.meta.outputs.release_tag }}-Setup.exe"
          Copy-Item (Join-Path $outputDir "IperfWinSetup.exe") $releaseInstaller -Force
          "installer_path=$releaseInstaller" >> $env:GITHUB_OUTPUT

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.release_tag }}-assets
          path: |
            ${{ steps.package_zip.outputs.zip_path }}
            ${{ steps.package_installer.outputs.installer_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_tag }}
          files: |
            ${{ steps.package_zip.outputs.zip_path }}
            ${{ steps.package_installer.outputs.installer_path }}
