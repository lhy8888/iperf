name: windows-ucrt64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake --preset windows-ucrt64

      - name: Build
        shell: msys2 {0}
        run: cmake --build --preset windows-ucrt64

      - name: Smoke tests
        shell: msys2 {0}
        run: ctest --test-dir build/windows-ucrt64 --output-on-failure --parallel 2 -R IperfSmoke

      - name: Package artifact
        shell: pwsh
        run: |
          $packageDir = "build/windows-ucrt64/package"
          $zipPath = Join-Path $packageDir "IperfWin-windows-ucrt64.zip"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "build/windows-ucrt64/bin/*" -DestinationPath $zipPath -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build/windows-ucrt64/installer" | Out-Null
          $isccCandidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            $iscc = (Get-Command iscc.exe).Source
          }
          $outputDir = (Resolve-Path "build/windows-ucrt64/installer").Path
          & $iscc "/O$outputDir" "/FIperfWinSetup" "installer/IperfWin.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IperfWin-windows-ucrt64
          path: build/windows-ucrt64/package/IperfWin-windows-ucrt64.zip
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: IperfWinSetup-windows-ucrt64
          path: build/windows-ucrt64/installer/IperfWinSetup.exe
          if-no-files-found: error
