name: windows-ucrt64

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake --preset windows-ucrt64

      - name: Build
        shell: msys2 {0}
        run: cmake --build --preset windows-ucrt64
