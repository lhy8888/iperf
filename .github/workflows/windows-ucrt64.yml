name: windows-ucrt64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake --preset windows-ucrt64

      - name: Build
        shell: msys2 {0}
        run: cmake --build --preset windows-ucrt64

      - name: Package artifact
        shell: pwsh
        run: |
          $packageDir = "build/windows-ucrt64/package"
          $zipPath = Join-Path $packageDir "IperfWin-windows-ucrt64.zip"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "build/windows-ucrt64/bin/*" -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IperfWin-windows-ucrt64
          path: build/windows-ucrt64/package/IperfWin-windows-ucrt64.zip
          if-no-files-found: error
